---
- name: Register RHEL host with Red Hat Satellite
  hosts: all
  gather_facts: False  # Facts not needed — all required values are passed as variables
  vars:
    pool_id: ''           # Subscription pool ID (optional when using activation keys)
    org: ''               # Satellite organization ID
    activationkey: ''     # Satellite activation key — defines repos, content views, and subscriptions
    server_hostname: ''   # FQDN of the Satellite server
    systemrole: "Red Hat Enterprise Server"
    usage: "Dev/Test"
    sla: "Self-Support"

  tasks:
    - name: Subscribe host to Satellite using activation key
      redhat_subscription:
        state: present                        # Register and attach — idempotent if already registered
        server_hostname: "{{server_hostname}}"  # Point subscription-manager at the Satellite server instead of RHSM
        org_id: "{{org}}"                     # Satellite organization to register under
        activationkey: "{{activationkey}}"    # Activation key assigns repos, content views, and lifecycle environment
        pool: '^Red Hat Enterprise Server$'   # Regex to match the correct pool by name on Satellite
        syspurpose:
          usage: "{{usage}}"                          # Intended workload type
          role: "{{systemrole}}"                      # System role reported to Satellite
          service_level_agreement: "{{sla}}"          # SLA tier for this system
          sync: true                                  # Immediately sync syspurpose with Satellite
