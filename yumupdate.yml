---
- name: Update all packages to latest version
  hosts: all
  gather_facts: False  # Facts not needed — yum wildcard update requires no host-specific data

  tasks:
    - name: Upgrade all installed packages to latest available version
      yum:
        name: '*'       # Wildcard targets every installed package on the host
        state: latest   # Upgrade any package that has a newer version available in enabled repos
