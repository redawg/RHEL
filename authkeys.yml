---
- name: Deploy SSH authorized key to user account
  hosts: all           # Run against all hosts in the inventory
  gather_facts: False  # Facts not needed — key deployment only requires the target username

  tasks:
    - name: Add SSH public key to authorized_keys for target user
      authorized_key:
        user: "{{ key_user }}"                            # Target user account to receive the key (passed via survey)
        state: present                                    # Ensure the key exists — idempotent, won't duplicate if already present
        key: "{{lookup('file', '/home/sshkey/redpub')}}" # Read the public key from this path on the AAP Controller at runtime
