---
- name: Create Ansible service account on target hosts
  hosts: all
  gather_facts: True   # Facts needed to resolve platform-specific paths if required

  tasks:
    - name: Create the service account user
      user:
        name: "{{ svcansible_username }}"                    # Username for the new service account (passed via survey)
        home: "{{ svcansible_home }}/{{ svcansible_username }}"  # Home directory path built from base path + username
        comment: Service account for Ansible               # GECOS field — describes the account purpose
        state: present                                      # Create if not present; idempotent
        system: True                                        # Mark as a system account (UID < 1000, no login shell by default)

    - name: Deploy SSH public key for the service account
      authorized_key:
        user: "{{ svcansible_username }}"    # Add the key to this user's authorized_keys file
        state: present                       # Ensure the key is present — won't duplicate if run again
        key: "{{ svcansible_public_key }}"   # The SSH public key string (passed via survey or credential)

    - name: Grant passwordless sudo access to service account
      copy:
        dest: "/etc/sudoers.d/{{ svcansible_username }}"         # Drop a dedicated sudoers file for this account
        content: "{{ svcansible_username }} ALL=(ALL) NOPASSWD: ALL\n"  # Allow all commands without password prompt
        owner: root
        group: root
        mode: 'ug+rwX,o='                    # Owner/group read-write; no permissions for others (sudoers security requirement)
      when: svcansible_sudoer == 'true'      # Only add sudo rule if explicitly requested via survey
